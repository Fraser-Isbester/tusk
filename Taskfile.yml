# https://taskfile.dev
version: '3'

vars:
  TUSK_DB: postgres://postgres:postgres@localhost:5432/tuskdev?sslmode=disable

tasks:
  build:
    desc: Build the tusk binary
    cmds:
      - go build -o tusk ./cmd/tusk
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - ./tusk

  build:daemon:
    desc: Build the tuskd daemon binary
    cmds:
      - go build -o tuskd ./cmd/tuskd
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - ./tuskd

  run:
    desc: Build and run tusk against the local dev database
    deps: [build]
    cmds:
      - ./tusk -P dev

  daemon:
    desc: Build and run the tuskd daemon against the local dev database
    deps: [build:daemon]
    cmds:
      - ./tuskd -P dev

  dev:
    desc: Build + run (alias)
    cmds:
      - task: run

  db:up:
    desc: Start postgres in docker
    cmds:
      - docker compose up -d
      - echo "Waiting for postgres..."
      - until docker exec tusk-postgres pg_isready -q; do sleep 0.5; done
      - echo "Postgres ready at localhost:5432"

  db:down:
    desc: Stop postgres
    cmds:
      - docker compose down

  db:reset:
    desc: Nuke and recreate (drops volume)
    cmds:
      - docker compose down -v
      - task: db:up

  db:psql:
    desc: Open psql shell
    interactive: true
    cmds:
      - docker exec -it tusk-postgres psql -U postgres -d tuskdev

  workload:
    desc: Run the workload script once
    cmds:
      - docker exec -i tusk-postgres psql -U postgres -d tuskdev < scripts/workload.sql

  workload:loop:
    desc: Run workload in a loop (background traffic)
    cmds:
      - |
        echo "Running workload every 5s — Ctrl+C to stop"
        while true; do
          docker exec -i tusk-postgres psql -U postgres -d tuskdev < scripts/workload.sql > /dev/null 2>&1
          sleep 5
        done

  loadtest:
    desc: Full load test — concurrent OLTP, analytics, idle-in-txn, lock contention
    cmds:
      - ./scripts/loadtest.sh {{.DURATION | default "60"}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f tusk tuskd

  test:
    desc: Run all tests with Ginkgo
    cmds:
      - go run github.com/onsi/ginkgo/v2/ginkgo -r --randomize-all --race ./...

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go run github.com/onsi/ginkgo/v2/ginkgo -r --randomize-all --race -v ./...

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go run github.com/onsi/ginkgo/v2/ginkgo -r --randomize-all --race --coverprofile=coverage.out --covermode=atomic ./...
      - go tool cover -func=coverage.out

  test:cover:html:
    desc: Open coverage report in browser
    deps: [test:cover]
    cmds:
      - go tool cover -html=coverage.out

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w cmd/ internal/

  fmt:check:
    desc: Check formatting (fails if unformatted)
    cmds:
      - test -z "$(gofmt -l cmd/ internal/)"

  check:
    desc: Run all checks (vet, fmt check, test)
    cmds:
      - task: vet
      - task: fmt:check
      - task: test
