version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gosec
    - unconvert
    - unparam
    - prealloc
  settings:
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/fraser-isbester/tusk

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
